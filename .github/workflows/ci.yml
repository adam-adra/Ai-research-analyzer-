name: CI Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install dependencies
      run: make install

    - name: Lint and Type Check
      run: make lint

    - name: Run tests
      run: uv run pytest -m "not live"    